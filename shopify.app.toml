# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8077e7ea8b4019ea709f16552d40d310"
name = "BUNDLE KIT"
application_url = "https://bundlekit.kaswebtechsolutions.com"

embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
   compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
   uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_inventory,write_inventory,read_orders,write_orders,read_draft_orders,write_draft_orders,read_order_edits,write_order_edits,read_fulfillments,write_fulfillments,write_discounts"

[auth]
redirect_urls = [ "https://bundlekit.kaswebtechsolutions.com/api/auth" ]
[capabilities]
bundles = true

[app_proxy]
 url = "https://bundlekit.kaswebtechsolutions.com"
 subpath = "bundler"
 prefix = "apps"
