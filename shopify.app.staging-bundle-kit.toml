# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "334c1e0a9e6336a7c9b5c922b931d807"
name = "staging-bundle-kit"
application_url = "https://rise-exam-activated-rouge.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

 [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"



[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_draft_orders,read_fulfillments,read_inventory,read_order_edits,read_orders,read_products,write_discounts,write_draft_orders,write_fulfillments,write_inventory,write_order_edits,write_orders,write_products"

[auth]
redirect_urls = [ "https://rise-exam-activated-rouge.trycloudflare.com/api/auth" ]

[capabilities]
bundles = true


[app_proxy]
 url = "https://rise-exam-activated-rouge.trycloudflare.com"
 subpath = "bundler"
 prefix = "apps"
